version: "3.8"

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stroke-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - stroke-network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: stroke-dashboard
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_URL=http://fastapi:8000
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - stroke-network

networks:
  stroke-network:
    driver: bridge